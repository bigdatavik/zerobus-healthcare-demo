resources:
  jobs:
    zerobus_healthcare_ingest:
      name: "Zerobus Healthcare Demo"
      description: "Sets up table and ingests healthcare events via Zerobus"

      tasks:
        # Task 1: Create schema and table
        - task_key: setup_table
          notebook_task:
            notebook_path: ../src/01_setup_table.py
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table: ${var.table}
            source: WORKSPACE
          environment_key: default

        # Task 2: Ingest data (depends on setup)
        - task_key: ingest_data
          depends_on:
            - task_key: setup_table
          notebook_task:
            notebook_path: ../src/02_zerobus_ingest.py
            base_parameters:
              zerobus_server_endpoint: ${var.zerobus_server_endpoint}
              workspace_url: ${workspace.host}
              table_name: ${var.catalog}.${var.schema}.${var.table}
              client_id: ${var.client_id}
              client_secret: ${var.client_secret}
              num_records: ${var.num_records}
            source: WORKSPACE
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - databricks-zerobus-ingest-sdk>=0.2.0

      tags:
        project: zerobus-healthcare-demo
        deployed_by: databricks-asset-bundles
